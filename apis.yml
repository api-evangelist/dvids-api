aid: dvids-api
name: DVIDS API
description: >-
  The Defense Visual Information Distribution Service (DVIDS) API provides
  programmatic access to over 1.8 million U.S. military news, photos, video,
  audio, publications, and unit assets. The API is implemented as JSON over
  HTTP and integration is possible from any language that can make an HTTP
  request and parse JSON responses.
